<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1200" height="780" fill="#1a1b26"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="780" fill="#1a1b26" stroke="#414868" stroke-width="1"/>
  <rect x="16" y="16" width="20" height="20" rx="5" fill="#e51937"/>
  <text x="44" y="31" fill="#e51937" font-size="15" font-weight="800">xerox</text>
  <text x="90" y="31" fill="#9aa5ce" font-size="9" font-weight="700" letter-spacing="1">MONITOR</text>
  <line x1="0" y1="52" x2="200" y2="52" stroke="#414868"/>

  <rect x="12" y="68" width="176" height="34" rx="9" fill="#7aa2f7"/>
  <text x="46" y="90" fill="#0b1020" font-size="12" font-weight="700">Dashboard</text>
  <text x="46" y="132" fill="#9aa5ce" font-size="12" font-weight="600">Endpoint Registry</text>
  <text x="46" y="174" fill="#9aa5ce" font-size="12" font-weight="600">Notification &amp; JSON</text>
  <text x="46" y="216" fill="#9aa5ce" font-size="12" font-weight="600">Reports</text>

  <text x="16" y="756" fill="#9aa5ce" font-size="9" font-weight="700">v1.0.0 (GUI v2.0)</text>

  <!-- Header -->
  <rect x="200" y="0" width="1000" height="54" fill="#24283b" stroke="#414868" stroke-width="1"/>
  <text x="222" y="32" fill="#9aa5ce" font-size="11" font-weight="700">STATUS:</text>
  <rect x="290" y="16" width="150" height="22" rx="6" fill="#1a1b26"/>
  <circle cx="302" cy="27" r="4" fill="#e0af68"/>
  <text x="312" y="31" fill="#9aa5ce" font-size="10" font-weight="800">MINOR ISSUES</text>
  <text x="452" y="31" fill="#6b7394" font-size="10" font-family="Consolas, monospace">&#183; Last sync 8:41:12 PM</text>
  <rect x="640" y="16" width="112" height="22" rx="11" fill="#3a2c11"/>
  <text x="654" y="31" fill="#e0af68" font-size="9.5" font-weight="700">1 of 5 self-signed</text>

  <circle cx="1108" cy="27" r="14" fill="none" stroke="#414868"/>
  <text x="1101" y="32" fill="#c0caf5" font-size="13">&#9788;</text>
  <circle cx="1156" cy="27" r="14" fill="none" stroke="#414868"/>
  <text x="1149" y="32" fill="#c0caf5" font-size="13">&#128276;</text>
  <circle cx="1166" cy="16" r="7" fill="#f7768e"/>
  <text x="1163" y="19" fill="#fff" font-size="8" font-weight="800">3</text>

  <!-- Stat cards -->
  <g font-size="10" font-weight="700">
    <rect x="222" y="72" width="180" height="70" rx="12" fill="#232a4a" stroke="#2a3050"/>
    <text x="238" y="94" fill="#9aa5ce" letter-spacing="1">TOTAL MONITORED</text>
    <text x="238" y="122" fill="#c0caf5" font-size="22" font-weight="800">5</text>
    <text x="264" y="122" fill="#9aa5ce" font-size="10" font-family="Consolas, monospace">+0</text>

    <rect x="414" y="72" width="180" height="70" rx="12" fill="#12332880" stroke="#1d4a3a"/>
    <text x="430" y="94" fill="#9aa5ce" letter-spacing="1">ONLINE</text>
    <text x="430" y="122" fill="#9ece6a" font-size="22" font-weight="800">3</text>
    <text x="454" y="122" fill="#9ece6a" font-size="10" font-family="Consolas, monospace">+1</text>

    <rect x="606" y="72" width="180" height="70" rx="12" fill="#3a162080" stroke="#552233"/>
    <text x="622" y="94" fill="#9aa5ce" letter-spacing="1">DOWN</text>
    <text x="622" y="122" fill="#f7768e" font-size="22" font-weight="800">1</text>
    <text x="646" y="122" fill="#9ece6a" font-size="10" font-family="Consolas, monospace">&#8722;1</text>

    <rect x="798" y="72" width="180" height="70" rx="12" fill="#3a2c1180" stroke="#553d1d"/>
    <text x="814" y="94" fill="#9aa5ce" letter-spacing="1">DEGRADED</text>
    <text x="814" y="122" fill="#e0af68" font-size="22" font-weight="800">1</text>
    <text x="844" y="122" fill="#9aa5ce" font-size="10" font-family="Consolas, monospace">+0</text>
  </g>

  <!-- Fleet strip -->
  <text x="222" y="168" fill="#9aa5ce" font-size="11">Fleet health: <tspan fill="#e0af68" font-weight="700" font-family="Consolas, monospace">60%</tspan>  &#183;  Avg response: <tspan fill="#9ece6a" font-weight="700" font-family="Consolas, monospace">184ms</tspan></text>

  <!-- Endpoint Status Cockpit panel -->
  <rect x="222" y="186" width="756" height="252" rx="10" fill="#2d2f3f" stroke="#414868"/>
  <rect x="222" y="186" width="756" height="34" rx="10" fill="#232a4a"/>
  <text x="238" y="208" fill="#7aa2f7" font-size="11" font-weight="800" letter-spacing="1">ENDPOINT STATUS COCKPIT</text>
  <rect x="238" y="230" width="724" height="28" rx="7" fill="#252a3d" stroke="#414868"/>
  <text x="250" y="248" fill="#6b7394" font-size="10">&#128269; Filter endpoints by name, URL, or auth type&#8230;</text>

  <!-- rows -->
  <g font-size="11">
    <circle cx="250" cy="284" r="5" fill="#f7768e"/>
    <text x="264" y="288" fill="#c0caf5" font-weight="700">SAP ERP Gateway</text>
    <rect x="410" y="277" width="46" height="16" rx="4" fill="#232a4a"/>
    <text x="417" y="289" fill="#7aa2f7" font-size="9" font-weight="700">NTLM</text>
    <text x="264" y="302" fill="#9aa5ce" font-size="9.5" font-family="Consolas, monospace">sap-erp.internal.xerox.com/health</text>
    <text x="820" y="288" fill="#6b7394" font-size="9.5" font-family="Consolas, monospace">8:41:12 PM</text>
    <text x="900" y="288" fill="#f7768e" font-weight="800" font-family="Consolas, monospace">timeout</text>

    <line x1="238" y1="316" x2="962" y2="316" stroke="#414868" stroke-opacity="0.5"/>

    <circle cx="250" cy="340" r="5" fill="#e0af68"/>
    <text x="264" y="344" fill="#c0caf5" font-weight="700">Print Fleet API</text>
    <rect x="392" y="333" width="66" height="16" rx="4" fill="#232a4a"/>
    <text x="399" y="345" fill="#7aa2f7" font-size="9" font-weight="700">API KEY</text>
    <text x="264" y="358" fill="#9aa5ce" font-size="9.5" font-family="Consolas, monospace">10.0.0.12/api/v1/status</text>
    <text x="820" y="344" fill="#6b7394" font-size="9.5" font-family="Consolas, monospace">8:41:05 PM</text>
    <text x="900" y="344" fill="#e0af68" font-weight="800" font-family="Consolas, monospace">812ms</text>

    <line x1="238" y1="372" x2="962" y2="372" stroke="#414868" stroke-opacity="0.5"/>

    <circle cx="250" cy="396" r="5" fill="#9ece6a"/>
    <text x="264" y="400" fill="#c0caf5" font-weight="700">Customer Portal Auth</text>
    <rect x="430" y="389" width="60" height="16" rx="4" fill="#2a2350"/>
    <text x="438" y="401" fill="#bb9af7" font-size="9" font-weight="700">OAUTH2</text>
    <text x="264" y="414" fill="#9aa5ce" font-size="9.5" font-family="Consolas, monospace">portal-auth.xerox.com/ping</text>
    <text x="820" y="400" fill="#6b7394" font-size="9.5" font-family="Consolas, monospace">8:41:09 PM</text>
    <text x="900" y="400" fill="#9ece6a" font-weight="800" font-family="Consolas, monospace">96ms</text>
  </g>

  <!-- Alerts + Activity -->
  <rect x="988" y="186" width="188" height="252" rx="10" fill="#2d2f3f" stroke="#414868"/>
  <rect x="988" y="186" width="188" height="30" rx="10" fill="#232a4a"/>
  <text x="1000" y="206" fill="#7aa2f7" font-size="9.5" font-weight="800">ACTIVE ALERTS</text>
  <rect x="1000" y="226" width="164" height="66" rx="7" fill="#252a3d" stroke="#5c2a35" stroke-width="0" />
  <rect x="1000" y="226" width="3" height="66" fill="#f7768e"/>
  <text x="1012" y="242" fill="#c0caf5" font-size="9.5" font-weight="700">SAP ERP Gateway</text>
  <rect x="1012" y="248" width="46" height="13" rx="6" fill="#3a1620"/>
  <text x="1017" y="258" fill="#f7768e" font-size="7.5" font-weight="700">CRITICAL</text>
  <text x="1012" y="278" fill="#9aa5ce" font-size="8.5">3 failures &#183; ECONNREFUSED</text>
  <rect x="1012" y="282" width="70" height="16" rx="5" fill="#1a2a52"/>
  <text x="1018" y="293" fill="#7aa2f7" font-size="7.5" font-weight="700">ACKNOWLEDGE</text>

  <rect x="988" y="450" width="188" height="252" rx="10" fill="#2d2f3f" stroke="#414868"/>
  <rect x="988" y="450" width="188" height="30" rx="10" fill="#232a4a"/>
  <text x="1000" y="470" fill="#7aa2f7" font-size="9.5" font-weight="800">RECENT ACTIVITY</text>
  <text x="1000" y="500" fill="#c0caf5" font-size="9" font-weight="700">Cloud Print Bridge</text>
  <text x="1000" y="514" fill="#9ece6a" font-size="8.5" font-family="Consolas, monospace">200 OK &#183; 210ms</text>
  <text x="1000" y="540" fill="#c0caf5" font-size="9" font-weight="700">SAP ERP Gateway</text>
  <text x="1000" y="554" fill="#f7768e" font-size="8.5" font-family="Consolas, monospace">ECONNREFUSED</text>

  <text x="222" y="470" fill="#5c6488" font-size="10" font-style="italic">Mockup — matches the shipped Dashboard layout and colors; not a live capture.</text>
</svg>
