<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1200" height="780" fill="#1a1b26"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="780" fill="#1a1b26" stroke="#414868" stroke-width="1"/>
  <rect x="16" y="16" width="20" height="20" rx="5" fill="#e51937"/>
  <text x="44" y="31" fill="#e51937" font-size="15" font-weight="800">xerox</text>
  <text x="90" y="31" fill="#9aa5ce" font-size="9" font-weight="700" letter-spacing="1">MONITOR</text>
  <line x1="0" y1="52" x2="200" y2="52" stroke="#414868"/>
  <text x="46" y="90" fill="#9aa5ce" font-size="12" font-weight="600">Dashboard</text>
  <text x="46" y="132" fill="#9aa5ce" font-size="12" font-weight="600">Endpoint Registry</text>
  <rect x="12" y="152" width="176" height="34" rx="9" fill="#7aa2f7"/>
  <text x="46" y="174" fill="#0b1020" font-size="12" font-weight="700">Notification &amp; JSON</text>
  <text x="46" y="216" fill="#9aa5ce" font-size="12" font-weight="600">Reports</text>
  <text x="16" y="756" fill="#9aa5ce" font-size="9" font-weight="700">v1.0.0 (GUI v2.0)</text>

  <!-- Header -->
  <rect x="200" y="0" width="1000" height="54" fill="#24283b" stroke="#414868" stroke-width="1"/>
  <text x="222" y="31" fill="#6b7394" font-size="10" font-family="Consolas, monospace">Alert delivery, backup &amp; data tools</text>

  <!-- Alert Delivery panel -->
  <rect x="222" y="72" width="756" height="196" rx="10" fill="#2d2f3f" stroke="#414868"/>
  <rect x="222" y="72" width="756" height="30" rx="10" fill="#232a4a"/>
  <text x="238" y="92" fill="#7aa2f7" font-size="11" font-weight="800" letter-spacing="1">ALERT DELIVERY</text>

  <text x="238" y="120" fill="#9aa5ce" font-size="9" font-weight="700">SMTP SERVER HOST</text>
  <rect x="238" y="126" width="380" height="24" rx="6" fill="#12141f" stroke="#414868"/>
  <text x="248" y="142" fill="#c0caf5" font-size="10" font-family="Consolas, monospace">smtp.company.com</text>
  <text x="632" y="120" fill="#9aa5ce" font-size="9" font-weight="700">PORT</text>
  <rect x="632" y="126" width="80" height="24" rx="6" fill="#12141f" stroke="#414868"/>
  <text x="642" y="142" fill="#c0caf5" font-size="10" font-family="Consolas, monospace">587</text>

  <rect x="238" y="160" width="720" height="24" rx="6" fill="#3a2c1150" stroke="#553d1d"/>
  <rect x="246" y="168" width="12" height="12" rx="3" fill="none" stroke="#e0af68"/>
  <text x="266" y="177" fill="#e0af68" font-size="9.5" font-weight="600">Allow self-signed / untrusted SMTP certificates</text>

  <text x="238" y="204" fill="#9aa5ce" font-size="9" font-weight="700">RECIPIENT ALERT EMAILS</text>
  <rect x="238" y="210" width="620" height="24" rx="6" fill="#12141f" stroke="#414868"/>
  <text x="248" y="226" fill="#c0caf5" font-size="10" font-family="Consolas, monospace">admin@company.com, alerts@company.com</text>
  <rect x="868" y="210" width="76" height="24" rx="6" fill="#12141f" stroke="#414868"/>
  <text x="884" y="226" fill="#9aa5ce" font-size="10" font-weight="700">Test</text>
  <text x="238" y="250" fill="#6b7394" font-size="8.5" font-style="italic">Test saves your current settings first, then sends a test.</text>

  <!-- Backup & Data -->
  <rect x="222" y="284" width="756" height="70" rx="10" fill="#2d2f3f" stroke="#414868"/>
  <rect x="222" y="284" width="756" height="30" rx="10" fill="#232a4a"/>
  <text x="238" y="304" fill="#7aa2f7" font-size="11" font-weight="800" letter-spacing="1">BACKUP &amp; DATA</text>
  <rect x="238" y="322" width="176" height="24" rx="6" fill="#12141f" stroke="#414868"/>
  <text x="250" y="338" fill="#9aa5ce" font-size="9.5" font-weight="700">&#8681; Export Backup JSON</text>
  <rect x="426" y="322" width="176" height="24" rx="6" fill="#12141f" stroke="#414868"/>
  <text x="438" y="338" fill="#9aa5ce" font-size="9.5" font-weight="700">&#8679; Import Backup JSON</text>

  <!-- Danger Zone -->
  <rect x="222" y="372" width="756" height="150" rx="10" fill="#2d2f3f" stroke="#c0304a"/>
  <rect x="222" y="372" width="756" height="30" rx="10" fill="#3a1620"/>
  <text x="238" y="392" fill="#f7768e" font-size="11" font-weight="800" letter-spacing="1">&#9888; DANGER ZONE</text>

  <text x="238" y="418" fill="#c0caf5" font-size="10" font-weight="700">Demo &amp; Test Data</text>
  <rect x="358" y="406" width="150" height="16" rx="4" fill="#3a2c11"/>
  <text x="366" y="418" fill="#e0af68" font-size="8" font-weight="700">NOT FOR PRODUCTION</text>
  <rect x="238" y="428" width="120" height="22" rx="6" fill="#12141f" stroke="#1d4a3a"/>
  <text x="248" y="443" fill="#9ece6a" font-size="9" font-weight="700">Seed Healthy (4)</text>
  <rect x="366" y="428" width="176" height="22" rx="6" fill="#12141f" stroke="#553d1d"/>
  <text x="376" y="443" fill="#e0af68" font-size="9" font-weight="700">Seed Mixed (2 Good, 2 Err)</text>
  <rect x="552" y="428" width="120" height="22" rx="6" fill="#12141f" stroke="#414868"/>
  <text x="562" y="443" fill="#9aa5ce" font-size="9" font-weight="700">Clear Seed Data</text>

  <line x1="238" y1="466" x2="962" y2="466" stroke="#552233"/>
  <text x="238" y="490" fill="#c0caf5" font-size="10" font-weight="700">Wipe Database Records</text>
  <text x="238" y="504" fill="#9aa5ce" font-size="8.5">Permanently deletes all endpoints, alerts, and audit logs.</text>
  <rect x="820" y="480" width="140" height="26" rx="6" fill="none" stroke="#c0304a"/>
  <text x="836" y="497" fill="#f7768e" font-size="9.5" font-weight="700">Wipe Database&#8230;</text>

  <text x="222" y="560" fill="#5c6488" font-size="10" font-style="italic">Mockup — matches the shipped Notification &amp; JSON layout; not a live capture.</text>
</svg>
