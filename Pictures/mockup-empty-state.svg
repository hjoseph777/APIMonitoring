<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1200" height="700" fill="#1a1b26"/>

  <!-- Sidebar: all four tabs visible, Dashboard active -->
  <rect x="0" y="0" width="200" height="700" fill="#1a1b26" stroke="#414868" stroke-width="1"/>
  <rect x="16" y="16" width="20" height="20" rx="5" fill="#e51937"/>
  <text x="44" y="31" fill="#e51937" font-size="15" font-weight="800">xerox</text>
  <text x="90" y="31" fill="#9aa5ce" font-size="9" font-weight="700" letter-spacing="1">MONITOR</text>
  <line x1="0" y1="52" x2="200" y2="52" stroke="#414868"/>

  <rect x="12" y="68" width="176" height="34" rx="9" fill="#7aa2f7"/>
  <text x="46" y="90" fill="#0b1020" font-size="12" font-weight="700">Dashboard</text>
  <text x="46" y="132" fill="#9aa5ce" font-size="12" font-weight="600">Endpoint Registry</text>
  <text x="46" y="174" fill="#9aa5ce" font-size="12" font-weight="600">Notification &amp; JSON</text>
  <text x="46" y="216" fill="#9aa5ce" font-size="12" font-weight="600">Reports</text>
  <text x="16" y="676" fill="#9aa5ce" font-size="9" font-weight="700">v1.0.0 (GUI v2.0)</text>

  <!-- Header -->
  <rect x="200" y="0" width="1000" height="54" fill="#24283b" stroke="#414868" stroke-width="1"/>
  <text x="222" y="31" fill="#9aa5ce" font-size="10" font-weight="700">STATUS:</text>
  <rect x="286" y="16" width="150" height="22" rx="6" fill="#1a1b26"/>
  <circle cx="298" cy="27" r="4" fill="#9ece6a"/>
  <text x="308" y="31" fill="#9aa5ce" font-size="10" font-weight="800">ALL SYSTEMS ONLINE</text>
  <text x="1156" y="32" fill="#c0caf5" font-size="13">&#128276;</text>
  <circle cx="1149" cy="27" r="14" fill="none" stroke="#414868"/>

  <!-- Stat cards, all zero -->
  <g font-size="10" font-weight="700">
    <rect x="222" y="72" width="180" height="70" rx="12" fill="#232a4a" stroke="#2a3050"/>
    <text x="238" y="94" fill="#9aa5ce" letter-spacing="1">TOTAL MONITORED</text>
    <text x="238" y="122" fill="#c0caf5" font-size="22" font-weight="800">0</text>

    <rect x="414" y="72" width="180" height="70" rx="12" fill="#232a4a" stroke="#2a3050"/>
    <text x="430" y="94" fill="#9aa5ce" letter-spacing="1">ONLINE</text>
    <text x="430" y="122" fill="#c0caf5" font-size="22" font-weight="800">0</text>

    <rect x="606" y="72" width="180" height="70" rx="12" fill="#232a4a" stroke="#2a3050"/>
    <text x="622" y="94" fill="#9aa5ce" letter-spacing="1">DOWN</text>
    <text x="622" y="122" fill="#c0caf5" font-size="22" font-weight="800">0</text>

    <rect x="798" y="72" width="180" height="70" rx="12" fill="#232a4a" stroke="#2a3050"/>
    <text x="814" y="94" fill="#9aa5ce" letter-spacing="1">DEGRADED</text>
    <text x="814" y="122" fill="#c0caf5" font-size="22" font-weight="800">0</text>
  </g>

  <text x="222" y="168" fill="#6b7394" font-size="11">Fleet health: --%   &#183;   Avg response: --ms</text>

  <!-- Endpoint Status Cockpit — empty -->
  <rect x="222" y="186" width="756" height="150" rx="10" fill="#2d2f3f" stroke="#414868"/>
  <rect x="222" y="186" width="756" height="34" rx="10" fill="#232a4a"/>
  <text x="238" y="208" fill="#7aa2f7" font-size="11" font-weight="800" letter-spacing="1">ENDPOINT STATUS COCKPIT</text>
  <text x="600" y="270" fill="#9aa5ce" font-size="11" font-weight="700" text-anchor="middle">No endpoints monitored</text>
  <text x="600" y="290" fill="#6b7394" font-size="9.5" text-anchor="middle">Go to Endpoint Registry to register your first endpoint.</text>

  <!-- Alerts + Activity, empty -->
  <rect x="988" y="186" width="188" height="150" rx="10" fill="#2d2f3f" stroke="#414868"/>
  <rect x="988" y="186" width="188" height="30" rx="10" fill="#232a4a"/>
  <text x="1000" y="206" fill="#7aa2f7" font-size="9.5" font-weight="800">ACTIVE ALERTS</text>
  <text x="1082" y="270" fill="#9ece6a" font-size="9" font-weight="700" text-anchor="middle">All systems</text>
  <text x="1082" y="284" fill="#9ece6a" font-size="9" font-weight="700" text-anchor="middle">operational</text>
  <text x="1082" y="300" fill="#6b7394" font-size="8" text-anchor="middle">No active alerts.</text>

  <rect x="222" y="352" width="954" height="94" rx="10" fill="#2d2f3f" stroke="#414868"/>
  <rect x="222" y="352" width="954" height="30" rx="10" fill="#232a4a"/>
  <text x="238" y="372" fill="#7aa2f7" font-size="9.5" font-weight="800">RECENT MONITOR ACTIVITY</text>
  <text x="700" y="410" fill="#9aa5ce" font-size="10" font-weight="700" text-anchor="middle">No logs recorded</text>
  <text x="700" y="426" fill="#6b7394" font-size="9" text-anchor="middle">Audit transaction records will appear here.</text>

  <text x="222" y="480" fill="#5c6488" font-size="10" font-style="italic">Mockup — Dashboard and sidebar tabs as they appear on first launch, before anything is registered.</text>
</svg>
