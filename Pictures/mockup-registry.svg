<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1200" height="780" fill="#1a1b26"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="780" fill="#1a1b26" stroke="#414868" stroke-width="1"/>
  <rect x="16" y="16" width="20" height="20" rx="5" fill="#e51937"/>
  <text x="44" y="31" fill="#e51937" font-size="15" font-weight="800">xerox</text>
  <text x="90" y="31" fill="#9aa5ce" font-size="9" font-weight="700" letter-spacing="1">MONITOR</text>
  <line x1="0" y1="52" x2="200" y2="52" stroke="#414868"/>
  <text x="46" y="90" fill="#9aa5ce" font-size="12" font-weight="600">Dashboard</text>
  <rect x="12" y="110" width="176" height="34" rx="9" fill="#7aa2f7"/>
  <text x="46" y="132" fill="#0b1020" font-size="12" font-weight="700">Endpoint Registry</text>
  <text x="46" y="174" fill="#9aa5ce" font-size="12" font-weight="600">Notification &amp; JSON</text>
  <text x="46" y="216" fill="#9aa5ce" font-size="12" font-weight="600">Reports</text>
  <text x="16" y="756" fill="#9aa5ce" font-size="9" font-weight="700">v1.0.0 (GUI v2.0)</text>

  <!-- Header -->
  <rect x="200" y="0" width="1000" height="54" fill="#24283b" stroke="#414868" stroke-width="1"/>
  <text x="222" y="31" fill="#6b7394" font-size="10" font-family="Consolas, monospace">5 endpoints registered</text>

  <!-- Registered Endpoints panel -->
  <rect x="222" y="72" width="756" height="240" rx="10" fill="#2d2f3f" stroke="#414868"/>
  <rect x="222" y="72" width="756" height="32" rx="10" fill="#232a4a"/>
  <text x="238" y="93" fill="#7aa2f7" font-size="11" font-weight="800" letter-spacing="1">REGISTERED ENDPOINTS</text>
  <text x="900" y="93" fill="#9aa5ce" font-size="10">5 total</text>

  <g font-size="11">
    <text x="238" y="130" fill="#c0caf5" font-weight="700">SAP ERP Gateway</text>
    <rect x="378" y="119" width="46" height="16" rx="4" fill="#232a4a"/>
    <text x="385" y="131" fill="#7aa2f7" font-size="9" font-weight="700">NTLM</text>
    <text x="238" y="146" fill="#9aa5ce" font-size="9.5" font-family="Consolas, monospace">sap-erp.internal.xerox.com/health</text>
    <circle cx="908" cy="126" r="12" fill="none" stroke="#414868"/>
    <text x="902" y="130" fill="#c0caf5" font-size="11">&#9998;</text>
    <circle cx="944" cy="126" r="12" fill="none" stroke="#414868"/>
    <text x="938" y="131" fill="#f7768e" font-size="11">&#128465;</text>

    <line x1="238" y1="162" x2="962" y2="162" stroke="#414868" stroke-opacity="0.5"/>

    <text x="238" y="188" fill="#c0caf5" font-weight="700">Print Fleet API</text>
    <rect x="360" y="177" width="66" height="16" rx="4" fill="#232a4a"/>
    <text x="367" y="189" fill="#7aa2f7" font-size="9" font-weight="700">API KEY</text>
    <!-- inline delete confirm state -->
    <text x="600" y="188" fill="#f7768e" font-size="10" font-weight="700">Remove Print Fleet API?</text>
    <rect x="800" y="176" width="60" height="20" rx="6" fill="#2a2f42"/>
    <text x="812" y="190" fill="#9aa5ce" font-size="9" font-weight="700">Cancel</text>
    <rect x="866" y="176" width="66" height="20" rx="6" fill="#c0304a"/>
    <text x="878" y="190" fill="#fff" font-size="9" font-weight="800">Confirm</text>

    <line x1="238" y1="220" x2="962" y2="220" stroke="#414868" stroke-opacity="0.5"/>

    <text x="238" y="246" fill="#c0caf5" font-weight="700">Customer Portal Auth</text>
    <rect x="398" y="235" width="60" height="16" rx="4" fill="#2a2350"/>
    <text x="406" y="247" fill="#bb9af7" font-size="9" font-weight="700">OAUTH2</text>
    <text x="238" y="262" fill="#9aa5ce" font-size="9.5" font-family="Consolas, monospace">portal-auth.xerox.com/ping</text>
    <circle cx="908" cy="242" r="12" fill="none" stroke="#414868"/>
    <text x="902" y="246" fill="#c0caf5" font-size="11">&#9998;</text>
    <circle cx="944" cy="242" r="12" fill="none" stroke="#414868"/>
    <text x="938" y="247" fill="#f7768e" font-size="11">&#128465;</text>
  </g>

  <!-- Register new endpoint disclosure -->
  <rect x="222" y="328" width="756" height="44" rx="10" fill="none" stroke="#414868" stroke-dasharray="4 3"/>
  <text x="242" y="356" fill="#7aa2f7" font-size="11" font-weight="700">+ Register New Endpoint</text>
  <text x="900" y="356" fill="#7aa2f7" font-size="11">&#8250;</text>

  <!-- Background Engine -->
  <rect x="222" y="390" width="756" height="110" rx="10" fill="#1e2230" stroke="#414868"/>
  <text x="238" y="414" fill="#9aa5ce" font-size="10" font-weight="800" letter-spacing="1">BACKGROUND ENGINE</text>
  <line x1="222" y1="424" x2="978" y2="424" stroke="#414868"/>
  <text x="238" y="446" fill="#9aa5ce" font-size="9" font-weight="700">CONSECUTIVE FAILURE THRESHOLD</text>
  <rect x="238" y="454" width="180" height="26" rx="6" fill="#12141f" stroke="#414868"/>
  <text x="248" y="471" fill="#c0caf5" font-size="10">Alert after 2 failures</text>
  <rect x="440" y="460" width="14" height="14" rx="3" fill="#7aa2f7"/>
  <text x="462" y="472" fill="#9aa5ce" font-size="10">Auto-start with System tray</text>
  <rect x="650" y="460" width="14" height="14" rx="3" fill="#7aa2f7"/>
  <text x="672" y="472" fill="#9aa5ce" font-size="10">Minimize to tray on close</text>
  <text x="826" y="470" fill="#9ece6a" font-size="9.5" font-weight="700">&#10003; Saved</text>
  <rect x="884" y="454" width="76" height="28" rx="7" fill="#3457d5"/>
  <text x="902" y="472" fill="#fff" font-size="10" font-weight="700">APPLY</text>

  <text x="222" y="540" fill="#5c6488" font-size="10" font-style="italic">Mockup — matches the shipped Endpoint Registry layout; not a live capture.</text>
</svg>
