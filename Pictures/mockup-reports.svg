  <rect x="222" y="396" width="756" height="122" rx="10" fill="#2d2f3f" stroke="#414868"/>
  <rect x="222" y="396" width="4" height="122" fill="#9ece6a"/>
  <text x="242" y="420" fill="#c0caf5" font-size="11" font-weight="700">Inventory Sync Service</text>
  <rect x="428" y="410" width="76" height="16" rx="4" fill="#232a4a"/>
  <text x="436" y="422" fill="#7aa2f7" font-size="9" font-weight="700">CERTIFICATE</text>
  <rect x="900" y="408" width="60" height="20" rx="10" fill="#123328"/>
  <text x="905" y="422" fill="#9ece6a" font-size="9" font-weight="700">Online</text>
  <text x="242" y="436" fill="#9aa5ce" font-size="9" font-family="Consolas, monospace">inv-sync.internal:8443/health</text>
  <polyline points="242,470 320,472 400,468 480,470 560,466 640,468 720,464 800,468 880,466 960,467" fill="none" stroke="#9ece6a" stroke-width="2"/>
  <text x="242" y="512" fill="#6b7394" font-size="8.5" font-style="italic">11 checks &#183; ~5 min interval &#183; last ~55 min</text>

  <text x="222" y="548" fill="#5c6488" font-size="10" font-style="italic">Mockup — matches the shipped Reports layout; not a live capture.</text>
