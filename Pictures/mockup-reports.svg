  <text x="242" y="304" fill="#9aa5ce" font-size="9" font-family="Consolas, monospace">10.0.0.12/api/v1/status</text>
  <polyline points="242,376 320,372 400,360 480,356 560,344 640,348 720,336 800,344 880,340 960,332" fill="none" stroke="#e0af68" stroke-width="2"/>
  <text x="242" y="380" fill="#6b7394" font-size="8.5" font-style="italic">11 checks &#183; ~5 min interval &#183; last ~55 min</text>

