  <text x="912" y="158" fill="#f7768e" font-size="9" font-weight="700">Down</text>
  <text x="242" y="172" fill="#9aa5ce" font-size="9" font-family="Consolas, monospace">sap-erp.internal.xerox.com/health</text>
