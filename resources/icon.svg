<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#bg-grad)" filter="url(#shadow)"/>
  
  <!-- Outer glowing ring -->
  <rect x="24" y="24" width="208" height="208" rx="40" fill="none" stroke="url(#ring-grad)" stroke-width="4" stroke-opacity="0.3" filter="url(#glow)"/>
  <rect x="24" y="24" width="208" height="208" rx="40" fill="none" stroke="url(#ring-grad)" stroke-width="2"/>

  <!-- Inner glowing circle representing the core -->
  <circle cx="128" cy="128" r="76" fill="#1e293b" stroke="url(#ring-grad)" stroke-width="6" filter="url(#shadow)"/>

  <!-- Pulse Line (Heartbeat / API Trace) -->
  <polyline points="64,128 92,128 112,88 144,168 164,128 192,128" fill="none" stroke="#10b981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Server/Node dots -->
  <circle cx="64" cy="128" r="8" fill="#10b981" filter="url(#glow)"/>
  <circle cx="192" cy="128" r="8" fill="#10b981" filter="url(#glow)"/>

</svg>
